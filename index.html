<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>a little gift 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at bottom, #0d1b2a, #000814);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* bintang */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
}

.stars span {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: blink 2s infinite ease-in-out;
}

@keyframes blink {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* shooting star */
.shooting-star {
    position: absolute;
    top: 20%;
    left: -100px;
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, white, transparent);
    opacity: 0;
    transform: rotate(25deg);
}

.shooting-star.active {
    animation: shoot 1.5s ease forwards;
}

@keyframes shoot {
    0% { opacity: 1; left: -100px; top: 20%; }
    100% { left: 120%; top: 60%; opacity: 0; }
}

/* card */
.card {
    position: relative;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 330px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

/* foto */
img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
    transform: scale(1.2);
    opacity: 0;
    transition: all 1.5s ease;
}

img.show {
    transform: scale(1);
    opacity: 1;
}

/* judul */
h1 {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

/* teks */
.line {
    opacity: 0;
    transition: opacity 0.8s ease;
    margin: 8px 0;
    color: #e0e0e0;
    font-size: 15px;
    text-align: center;
    line-height: 1.5;
}

.line.show {
    opacity: 1;
}

/* glow akhir */
.glow {
    color: #fff;
    text-shadow: 0 0 8px #fff, 0 0 20px #89f7fe, 0 0 30px #66a6ff;
}

/* tombol */
button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="shooting-star" id="shooting-star"></div>

<audio id="bgm">
  <source src="anything.mp3" type="audio/mpeg">
</audio>

<div class="card">

<img id="photo" src="ndut.jpg.JPEG" alt="ndut">

<h1>happy birthday 🎂</h1>

<div id="text-container"></div>

<button id="btn" onclick="startAll()">open your gift 🎁</button>

</div>

<script>
const lines = [
"Selamat ulang tahun yaa, ndut / el! 🎉",
"",
"Semoga makin ganteng (walaupun udah banget 😌),",
"makin sabar ngadepin aku,",
"dan semua hal baik dateng ke kamu 💙",
"",
"Jangan keseringan ngomel mulu ke aku ya 😠",
"hahaha apapupuu 😝",
"",
"Pokoknya… makasih ya udah jadi kamu yang sekarang 🤍",
"semoga hari-hari kamu selalu banyak hal baik,",
"dan jangan lupa bahagia terus yaa!",
"",
"hope you like this little gift ✨"
];

let started = false;

function startAll() {
    if (started) return;
    started = true;

    document.getElementById("btn").style.display = "none";

    const music = document.getElementById("bgm");
    music.volume = 0.5;
    music.play();

    document.getElementById("photo").classList.add("show");

    confetti({
        particleCount: 120,
        spread: 70,
        origin: { y: 0.6 }
    });

    showLines();
}

/* teks muncul */
function showLines() {
    const container = document.getElementById("text-container");
    container.innerHTML = "";

    lines.forEach((line, index) => {
        setTimeout(() => {
            const p = document.createElement("div");
            p.className = "line";

            if (index === lines.length - 1) {
                p.classList.add("glow");

                const star = document.getElementById("shooting-star");
                setTimeout(() => {
                    star.classList.add("active");
                }, 300);
            }

            p.innerHTML = line;
            container.appendChild(p);

            setTimeout(() => {
                p.classList.add("show");
            }, 50);

        }, index * 1200);
    });
}

/* generate bintang */
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 80; i++) {
    let star = document.createElement("span");
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (Math.random() * 2 + 1) + "s";
    starsContainer.appendChild(star);
}
</script>

</body>
</html>
